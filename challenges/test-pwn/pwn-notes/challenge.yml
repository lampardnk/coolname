name: "Heap Notes"
slug: pwn-notes
category: "Test-Pwn"
description: |
  A note-taking service backed by the heap. Create, view, edit, and delete notes.

  The developer forgot to clear the pointer after `free()`. Classic use-after-free.
  Exploit tcache poisoning to hijack a function pointer.

  **Binary protections**: NX, canary, PIE, Full RELRO
  **Libc**: Ubuntu 22.04 (glibc 2.35)

  `nc <host> <port>`
